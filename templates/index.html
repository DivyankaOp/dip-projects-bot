<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMS Sheet Assistant</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --bubble-user:#2563eb; --bubble-bot:#1f2430;
    --text:#e6e8ee; --muted:#8b93a5; --accent:#22c55e; --border:#262b36;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column;
  }
  header{
    padding:16px 20px; background:var(--panel); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  header .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
  header h1{font-size:16px; margin:0; font-weight:600;}
  header p{margin:0; font-size:12px; color:var(--muted);}
  #chat{
    flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px;
  }
  .msg{max-width:75%; padding:12px 15px; border-radius:14px; line-height:1.5; font-size:14.5px;}
  .user{align-self:flex-end; background:var(--bubble-user); color:white; border-bottom-right-radius:4px; white-space:pre-wrap;}
  .bot{align-self:flex-start; background:var(--bubble-bot); border:1px solid var(--border); border-bottom-left-radius:4px; max-width:92%;}
  .bot p{margin:0 0 8px 0;}
  .bot p:last-child{margin-bottom:0;}
  .bot ul, .bot ol{margin:6px 0; padding-left:20px;}
  .bot strong{color:#fff;}
  .bot-table-wrap{overflow-x:auto; margin:8px 0;}
  .bot table{border-collapse:collapse; width:100%; font-size:13.5px;}
  .bot th, .bot td{border:1px solid var(--border); padding:6px 10px; text-align:left; white-space:nowrap;}
  .bot th{background:#262b36; color:#fff; font-weight:600;}
  .bot tr:nth-child(even) td{background:#1a1e27;}
  .bot code{background:#0f1115; padding:2px 5px; border-radius:4px; font-size:13px;}
  .sources{font-size:11px; color:var(--muted); margin-top:6px;}
  .typing{align-self:flex-start; color:var(--muted); font-size:13px; padding:0 15px;}
  form{
    display:flex; gap:10px; padding:16px 20px; background:var(--panel); border-top:1px solid var(--border);
  }
  input{
    flex:1; padding:12px 14px; border-radius:10px; border:1px solid var(--border);
    background:#0f1115; color:var(--text); font-size:14.5px; outline:none;
  }
  input:focus{border-color:var(--bubble-user);}
  button{
    padding:12px 20px; border-radius:10px; border:none; background:var(--bubble-user);
    color:white; font-weight:600; cursor:pointer; font-size:14px;
  }
  button:disabled{opacity:0.5; cursor:not-allowed;}
</style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <div>
      <h1>PMS Sheet Assistant</h1>
      <p>Live Google Sheets data + Gemini AI</p>
    </div>
  </header>

  <div id="chat"></div>

  <form id="form">
    <input id="input" type="text" placeholder="Apna sawaal likho... (jaise: TAJ VIVANTA HOTEL ki latest drawings kya hain?)" autocomplete="off" />
    <button id="sendBtn" type="submit">Bhejo</button>
  </form>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const sessionId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now());

function addMsg(text, cls, sources) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  if (cls === 'bot') {
    // Bot ka jawab markdown ho sakta hai (tables, bold, lists) -- usko HTML mein render karo
    div.innerHTML = marked.parse(text);
    // Table ko horizontally scrollable wrapper mein daal do (mobile ke liye)
    div.querySelectorAll('table').forEach(t => {
      const wrap = document.createElement('div');
      wrap.className = 'bot-table-wrap';
      t.parentNode.insertBefore(wrap, t);
      wrap.appendChild(t);
    });
  } else {
    div.textContent = text;
  }
  if (sources && sources.length) {
    const s = document.createElement('div');
    s.className = 'sources';
    s.textContent = '📄 Source: ' + sources.join(', ');
    div.appendChild(s);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;
  addMsg(question, 'user');
  input.value = '';
  sendBtn.disabled = true;

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Sheet check ho rahi hai...';
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question, session_id: sessionId})
    });
    const data = await res.json();
    typing.remove();
    if (data.error) {
      addMsg('Error: ' + data.error, 'bot');
    } else {
      addMsg(data.answer, 'bot', data.sources);
    }
  } catch (err) {
    typing.remove();
    addMsg('Kuch गलत हो गया: ' + err.message, 'bot');
  }
  sendBtn.disabled = false;
  input.focus();
});

addMsg('Namaste! Mujhse PMS 3.2 ya 1 june sheet se related koi bhi sawaal pooch sakte ho.', 'bot');
</script>
</body>
</html>
